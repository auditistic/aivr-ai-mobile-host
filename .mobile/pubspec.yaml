name: aivr_node
description: AIVR - Node — Dedicated AI Farm worker node, earn tokens by contributing compute
publish_to: 'none'
version: 2.1.0+1

environment:
  sdk: '>=3.7.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cactus: ^1.3.0
  wakelock_plus: ^1.1.4
  path_provider: ^2.1.2
  uuid: ^4.3.3
  shared_preferences: ^2.2.2
  http: ^1.1.0
  cryptography: ^2.7.0
  cryptography_flutter: ^2.3.2
  convert: ^3.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  # Enable desktop targets
  # Run: flutter config --enable-windows-desktop
  #      flutter config --enable-macos-desktop
  #      flutter config --enable-linux-desktop

dependency_overrides:
  path: ^1.9.0


flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
